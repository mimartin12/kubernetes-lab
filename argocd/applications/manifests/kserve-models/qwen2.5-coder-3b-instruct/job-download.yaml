apiVersion: batch/v1
kind: Job
metadata:
  name: download-qwen-coder
  namespace: kserve-test
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: talos-worker-01
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 0
      hostPID: true
      initContainers:
      - name: setup-storage
        image: busybox
        command:
          - sh
          - -c
          - |
            mkdir -p /host/var/mnt/qwen-coder-store
            chmod 755 /host/var/mnt/qwen-coder-store
            echo "Storage directory created"
        volumeMounts:
        - name: host-root
          mountPath: /host
        securityContext:
          privileged: true
      containers:
      - name: downloader
        image: python:3.11-slim
        command:
          - /bin/sh
          - -c
          - |
            pip install -q huggingface_hub hf_transfer &&
            python -c "
            from huggingface_hub import snapshot_download
            snapshot_download(
              repo_id='Qwen/Qwen2.5-Coder-3B-Instruct',
              local_dir='/mnt/models/Qwen2.5-Coder-3B-Instruct',
              ignore_patterns=['*.pt', 'original/*']
            )
            "
        env:
          - name: HF_HUB_CACHE
            value: "/mnt/models/.cache"
          - name: HF_HUB_ENABLE_HF_TRANSFER
            value: "1"
        volumeMounts:
        - name: model-store
          mountPath: /mnt/models
        resources:
          requests:
            memory: 1Gi
            cpu: 200m
      volumes:
      - name: model-store
        persistentVolumeClaim:
          claimName: qwen-coder-pvc
      - name: host-root
        hostPath:
          path: /
      restartPolicy: Never
  backoffLimit: 5