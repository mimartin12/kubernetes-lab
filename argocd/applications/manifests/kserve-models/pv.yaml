apiVersion: v1
kind: PersistentVolume
metadata:
  name: model-store-pv
spec:
  capacity:
    storage: 200Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-model-store
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /var/mnt/model-store
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: model-store
              operator: In
              values:
                - "true"