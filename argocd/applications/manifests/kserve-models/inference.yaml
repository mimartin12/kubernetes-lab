apiVersion: "serving.kserve.io/v1beta1"
kind: "InferenceService"
metadata:
  name: "qwen-llm"
  namespace: kserve-test
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  predictor:
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    runtimeClassName: nvidia
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
    model:
      modelFormat:
        name: huggingface
      args:
        - --model_name=qwen
        - --served-model-name=qwen
        - --max-model-len=4096
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      # TODO: Switch back when KServe supports qwen3_5 arch
      # storageUri: "pvc://model-store-pvc/Qwen3.5-4B"
      storageUri: "pvc://model-store-pvc/Qwen3-4B"
      resources:
        limits:
          cpu: "2"
          memory: 8Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "1"
          memory: 6Gi
          nvidia.com/gpu: "1"