apiVersion: batch/v1
kind: Job
metadata:
  name: download-qwen3-8b
  namespace: kserve-test
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: talos-worker-01
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
      - name: downloader
        image: kserve/storage-initializer:v0.16.0
        args:
          - "hf://Qwen/Qwen3-8B"
          - "/mnt/models/Qwen3-8B"
        env:
          - name: HF_HUB_CACHE
            value: "/mnt/models/.cache"
        volumeMounts:
        - name: model-store
          mountPath: /mnt/models
        resources:
          requests:
            memory: 1Gi
            cpu: 500m
          limits:
            memory: 2Gi
            cpu: "1"
      volumes:
      - name: model-store
        persistentVolumeClaim:
          claimName: model-store-pvc
      restartPolicy: Never
  backoffLimit: 2